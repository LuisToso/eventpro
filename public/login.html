<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e293b" />
  <title>EventPro · Iniciar sesión</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-body">
  <main class="login-box">
    <div class="login-brand">
      <span class="logo">EP</span>
      <h1>EventPro</h1>
      <p class="subtitle">Calendario compartido del equipo</p>
    </div>

    <form id="loginForm" class="login-form">
      <label>
        Contraseña del equipo
        <input type="password" id="password" required autofocus autocomplete="current-password" />
      </label>
      <div class="form-error" id="loginError" hidden></div>
      <button type="submit" class="btn btn-primary btn-block">Entrar</button>
    </form>

    <p class="login-hint">
      Si no conoces la contraseña pídela al administrador del equipo.
    </p>
  </main>

  <script src="login.js"></script>
</body>
</html>
